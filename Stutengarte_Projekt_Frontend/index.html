<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stutengarten Bankfiliale</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top-bar">
  <div class="top-title">
    <span style="color:#c3aad2;">S</span>
    <span style="color:#F0825A;">t</span>
    <span style="color:#19AAD2;">u</span>
    <span style="color:#FFD719;">t</span>
    <span style="color:#c3aad2;">e</span>
    <span style="color:#F0825A;">n</span>
    <span style="color:#19AAD2;">g</span>
    <span style="color:#FFD719;">a</span>
    <span style="color:#c3aad2;">r</span>
    <span style="color:#F0825A;">t</span>
    <span style="color:#19AAD2;">e</span>
    <span style="color:#FFD719;">n</span>
    &nbsp;
    <span style="color:#c3aad2;">B</span>
    <span style="color:#F0825A;">a</span>
    <span style="color:#19AAD2;">n</span>
    <span style="color:#FFD719;">k</span>
    <span style="color:#c3aad2;">f</span>
    <span style="color:#F0825A;">i</span>
    <span style="color:#19AAD2;">l</span>
    <span style="color:#FFD719;">i</span>
    <span style="color:#c3aad2;">a</span>
    <span style="color:#F0825A;">l</span>
    <span style="color:#19AAD2;">e</span>
  </div>
</header>

<main class="page-wrapper">

  <!-- LOGIN -->
  <section id="login" class="page active">
    <img src="Login_Logo.png" class="logo">

    <div class="form-block">
      <label>Ausweis Nummer:</label>
      <input id="ausweis">

      <label>Passwort:</label>
      <input id="passwort" type="password">

      <button id="loginButton">Login</button>
      <div id="status"></div>
    </div>
  </section>

  <!-- MENÜ -->
  <section id="menu" class="page">


    <div class="menu-grid">
      <div class="menu-card" onclick="showPage('kundeErstellen')">
        Kunde<br>erstellen
      </div>

      <div class="menu-card" onclick="showPage('kundeAuswaehlen')">
        Kunde<br>auswählen
      </div>

      <div class="menu-card" onclick="kontoAnzeigen(); showPage('konto')">
        Konto<br>ansehen
      </div>

      <div class="menu-card" onclick="showPage('einzahlen')">
        Einzahlen
      </div>

      <div class="menu-card" onclick="showPage('abheben')">
        Abheben
      </div>

      <div class="menu-card logout" onclick="logout()">
        Logout
      </div>
    </div>
  </section>

  <!-- KUNDE ERSTELLEN -->
  <section id="kundeErstellen" class="page">
    <h2>Neuen Kunden erstellen</h2>
    <input id="kundenName" placeholder="Name eingeben">
    <button onclick="kundeErstellen()">Erstellen</button>
    <button onclick="showPage('menu')">Zurück</button>
  </section>

  <!-- KUNDE AUSWÄHLEN -->
  <section id="kundeAuswaehlen" class="page">
    <h2>Kunde auswählen</h2>
    <select id="kundenListe"></select>
    <button onclick="kundeWaehlen()">Auswählen</button>
    <button onclick="showPage('menu')">Zurück</button>
  </section>

  <!-- KONTO -->
  <section id="konto" class="page">
    <h2>Kontoübersicht</h2>
    <p id="kontoInfo">Kein Kunde ausgewählt</p>
    <button onclick="showPage('menu')">Zurück</button>
  </section>

  <!-- EINZAHLEN -->
  <section id="einzahlen" class="page">
    <h2>Einzahlen</h2>
    <input id="depositAmount" placeholder="Betrag eingeben">
    <button onclick="deposit()">Einzahlen</button>
    <button onclick="showPage('menu')">Zurück</button>
  </section>

  <!-- ABHEBEN -->
  <section id="abheben" class="page">
    <h2>Abheben</h2>
    <input id="withdrawAmount" placeholder="Betrag eingeben">
    <button onclick="withdraw()">Abheben</button>
    <button onclick="showPage('menu')">Zurück</button>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
