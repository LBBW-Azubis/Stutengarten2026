<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stutengarten Bankfiliale</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>

  <header class="header">
    <div class="header-title">
      <span style="color:#c3aad2;">S</span><span style="color:#F0825A;">t</span><span style="color:#19AAD2;">u</span><span style="color:#FFD719;">t</span><span style="color:#c3aad2;">e</span><span style="color:#F0825A;">n</span><span style="color:#19AAD2;">g</span><span style="color:#FFD719;">a</span><span style="color:#c3aad2;">r</span><span style="color:#F0825A;">t</span><span style="color:#19AAD2;">e</span><span style="color:#FFD719;">n</span>
      
      <span style="color:#c3aad2;">B</span><span style="color:#F0825A;">a</span><span style="color:#19AAD2;">n</span><span style="color:#FFD719;">k</span><span style="color:#c3aad2;">f</span><span style="color:#F0825A;">i</span><span style="color:#19AAD2;">l</span><span style="color:#FFD719;">i</span><span style="color:#c3aad2;">a</span><span style="color:#F0825A;">l</span><span style="color:#19AAD2;">e</span>
    </div>
  </header>

  <main id="app"></main>

  <!-- Footer-Leiste: Betreuer-Login links, BW-Bank-Logo rechts, X-Button ganz links -->
  <footer class="fusszeile">
    <button class="x-btn" id="closeBtn">X</button>
    <div class="betreuer-bereich">
      <span class="betreuer-label">Betreuer-Login:</span>
      <input type="password" id="betreuerPwInput" placeholder="" maxlength="10" />
      <button class="betreuer-such-btn" id="betreuerSuchBtn" aria-label="Betreuer suchen">
        <img src="images/Suchen.png" alt="Suchen" />
      </button>
    </div>
    <!-- Platzhalter: images/BwBank_Logo.png -->
    <img src="images/BwBank_Logo.png" alt="BW Bank" class="bwbank-logo"
         onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';" />
    <span class="bwbank-fallback" style="display:none;">BW&#8801;BANK</span>
  </footer>

  <!-- Zurück-zur-Startseite-Bar (nur auf Unterseiten) -->
  <div class="zurueck-bar" id="backBar" style="display:none;">
    <button class="zurueck-btn" id="backBtn">zur Startseite</button>
    <!-- Platzhalter: images/Zurueck_Pfeil.png -->
    <img src="images/Zurueck_Pfeil.png" alt="Zurück" class="zurueck-pfeil"
         onerror="this.style.display='none';" />
  </div>

  <script src="app.js"></script>
</body>
</html>
