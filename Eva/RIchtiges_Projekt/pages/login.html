<!-- pages/login.html – Login-Seite Vorlage -->
<div class="page login-seite">
  <div class="login-icon">
    <!-- BILD EINSETZEN: images/Login.png -->
    <img src="images/Login.png" alt="Person" style="width:160px;height:160px;object-fit:contain;" />
  </div>
  <div class="login-felder">
    <div class="feld-zeile">
      <label>Ausweis Nummer:</label>
      <input type="text" class="feld-input" placeholder="…." maxlength="6" />
      <button class="such-btn">
        <!-- BILD EINSETZEN: images/Suchen.png -->
        <img src="images/Suchen.png" alt="Suchen" style="width:32px;height:32px;" />
      </button>
    </div>
    <div class="feld-zeile">
      <label>Passwort:</label>
      <input type="password" class="feld-input" placeholder="…." />
    </div>
  </div>
</div>
