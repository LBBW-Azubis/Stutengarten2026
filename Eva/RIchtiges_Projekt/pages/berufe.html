<!-- pages/berufe.html – Einfaches Verwaltungstool für Betreuer -->
<div class="page">
  <h2 style="text-align:center; margin-bottom:12px;">Berufe verwalten (Betreuer)</h2>

  <div id="auth-area" style="text-align:center; margin-bottom:18px;">
    <label style="font-weight:bold; margin-right:8px;">Betreuer-Code:</label>
    <input id="admin-code" class="feld-input" placeholder="Code eingeben" />
    <button id="unlock-btn" class="btn btn-blau" style="margin-left:8px;">Entriegeln</button>
  </div>

  <div id="manage-area" style="display:none;">
    <div style="display:flex; gap:10px; margin-bottom:12px;">
      <input id="beruf-input" class="feld-input" placeholder="Neuen Beruf hinzufügen" />
      <button id="add-beruf" class="btn btn-gruen">Hinzufügen</button>
    </div>

    <ul id="berufe-list" style="list-style:none; padding-left:0;"></ul>
  </div>

  <p style="margin-top:18px; color:#555; font-size:0.95rem;">Hinweis: Nur Betreuer dürfen Berufe hinzufügen. Dies ist ein einfaches Frontend-Tool (localStorage).</p>
</div>

<script src="../js/berufe.js"></script>
